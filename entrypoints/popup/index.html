<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>znam</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>znam</h1>

    <button id="toggle" class="primary">Activate reader on this page</button>
    <label class="row checkbox">
      <input type="checkbox" id="auto-host" />
      <span>Always on for <span id="hostname">this site</span></span>
    </label>

    <div class="row">
      <label for="target-lang">I'm learning</label>
      <select id="target-lang"></select>
    </div>
    <div class="row">
      <label for="native-lang">Translate to</label>
      <select id="native-lang"></select>
    </div>
    <div class="row">
      <label for="primary-translation">Primary source</label>
      <select id="primary-translation">
        <option value="google">Google Translate</option>
        <option value="reverso">Reverso Context</option>
        <option value="deepl">DeepL (unofficial)</option>
      </select>
    </div>

    <div id="lang-state" class="state"></div>

    <div class="row">
      <label for="manga-source">Manga OCR</label>
      <select id="manga-source">
        <option value="auto">Auto (EN+PL)</option>
        <option value="en">English</option>
        <option value="pl">Polish</option>
      </select>
    </div>
    <p class="hint" style="margin:2px 0 8px;color:#888;font-size:11px">
      On mangadex.org / weebcentral.com, OCRs pages and translates them into your
      learning language — click words to look up & track them. Toggle per page
      with the 📖 button.
    </p>

    <button id="open-app">Open library &amp; words</button>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
